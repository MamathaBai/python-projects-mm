# .github/workflows/ci.yml
name: Node.js CI

# Defines the events that trigger the automated workflow
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger this workflow from the GitHub UI

# Defines the actual tasks to execute
jobs:
  build-and-test:
    # Specifies the type of virtual runner machine to use
    runs-on: ubuntu-latest

    # The sequence of tasks executed inside the runner environment
    steps:
      # 1. Clones your repository files onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installs the specific language environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Speeds up jobs by caching dependency folders

      # 3. Installs dependencies from your package.json
      - name: Install dependencies
        run: npm ci

      # 4. Runs your test scripts
      - name: Run automated tests
        run: npm test
